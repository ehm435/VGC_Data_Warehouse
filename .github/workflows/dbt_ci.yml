name: dbt CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  compile_dbt_models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup dbt profile
        run: |
          mkdir -p ~/.dbt
          cat << EOF > ~/.dbt/profiles.yml
          vgc_dbt:
            outputs:
              dev:
                type: duckdb
                path: :memory:
            target: dev
          EOF

      - name: Compile dbt models
        working-directory: ./vgc_dbt
        run: |
          dbt deps
          dbt compile
